<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="16" fill="#4CA77B"/>

  <!-- Left ear -->
  <path d="M30 8 C28 4, 32 2, 34 6 C36 12, 35 22, 34 30 L34 38"
        stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Right ear -->
  <path d="M42 8 C40 4, 44 2, 46 6 C48 12, 47 22, 46 30 L44 38"
        stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- R vertical stroke -->
  <path d="M24 40 L24 88"
        stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- R bowl/head curve -->
  <path d="M24 40 L44 40 C58 40, 64 48, 64 54 C64 62, 56 68, 44 68 L24 68"
        stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- R diagonal leg -->
  <path d="M42 68 L68 88"
        stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Eye dot -->
  <circle cx="50" cy="54" r="3" fill="white"/>

  <!-- Tail wiggle lines (wifi signal style) -->
  <path d="M70 82 C76 78, 74 86, 80 82"
        stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M74 76 C80 72, 78 80, 84 76"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
