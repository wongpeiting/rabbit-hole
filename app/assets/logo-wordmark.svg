    <path d="M0 64 L0 26 L18 26 Q28 26 28 34 Q28 40 22 42 Q30 44 30 52 Q30 64 18 64 L0 64" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
